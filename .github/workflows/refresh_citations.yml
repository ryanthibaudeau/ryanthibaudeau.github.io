name: Refresh Scholar Citation Cache

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch data and update Gist
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: dc3b698a62e01a73e40c72f272ca821c
          SCHOLAR_ID: v8wAa0oAAAAJ
          ORCID_ID: 0009-0000-6483-2373
        run: |
          curl -s "https://serpapi.com/search.json?engine=google_scholar_author&author_id=${SCHOLAR_ID}&api_key=${SERPAPI_KEY}&num=100" > /tmp/scholar.json
          curl -s -H "Accept: application/json" "https://pub.orcid.org/v3.0/${ORCID_ID}/works" > /tmp/works_summary.json
          echo "" | base64 -d > /tmp/refresh.py
          python3 /tmp/refresh.py
